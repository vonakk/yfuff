name: TradeGUI
version: 1.0.0
main: com.tradegui.plugin.TradeGUIPlugin
api-version: 1.20
depend: [Vault]
author: Custom
description: Безопасный обмен предметами и деньгами между игроками (PC + мобильные/Bedrock через Geyser)

commands:
  trade:
    description: Торговля между игроками
    usage: |
      /trade <ник> - предложить торговлю
      /trade accept - принять предложение
      /trade deny - отклонить предложение
      /trade money <сумма> - выставить деньги в текущей торговле
      /trade cancel - отменить текущую торговлю
